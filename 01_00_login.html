<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>고객사 어드민 로그인</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      font-family: 'Noto Sans KR', sans-serif;
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      margin: 0;
      position: relative;
      overflow: hidden;
    }
    
    /* 배경 장식 요소 */
    body::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(66, 153, 225, 0.1) 0%, transparent 70%);
      transform: rotate(45deg);
    }
    
    body::after {
      content: '';
      position: absolute;
      bottom: -50%;
      left: -20%;
      width: 80%;
      height: 80%;
      background: radial-gradient(circle, rgba(66, 153, 225, 0.05) 0%, transparent 70%);
      transform: rotate(-45deg);
    }
    
    .login-wrap {
      width: 420px; 
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 24px; 
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      padding: 48px 40px 40px 40px;
      display: flex; 
      flex-direction: column; 
      align-items: center;
      position: relative;
      z-index: 10;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .login-logo { 
      width: 84px; 
      margin-bottom: 24px;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
    }
    
    .login-title { 
      font-size: 28px; 
      font-weight: 700; 
      color: #2d3748; 
      margin-bottom: 32px; 
      letter-spacing: -0.5px;
      text-align: center;
      background: linear-gradient(135deg, #4299e1 0%, #667eea 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .login-form { 
      width: 100%; 
    }
    
    .login-label { 
      font-size: 15px; 
      color: #4a5568; 
      margin-bottom: 8px; 
      font-weight: 600;
      display: block;
    }
    
    .login-input { 
      width: 100%; 
      padding: 16px 20px; 
      font-size: 16px; 
      border: 2px solid #e2e8f0; 
      border-radius: 12px; 
      background: #ffffff;
      margin-bottom: 20px; 
      outline: none; 
      transition: all 0.3s ease;
      font-weight: 500;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }
    
    .login-input:focus { 
      border-color: #4299e1;
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(66, 153, 225, 0.1), 0 4px 12px rgba(0, 0, 0, 0.1);
      transform: translateY(-1px);
    }
    
    .login-input::placeholder {
      color: #a0aec0;
      font-weight: 400;
    }
    
    .login-btn { 
      width: 100%; 
      padding: 16px 0; 
      font-size: 18px; 
      font-weight: 700; 
      background: linear-gradient(135deg, #4299e1 0%, #3182ce 100%);
      color: #ffffff; 
      border: none; 
      border-radius: 12px; 
      margin-top: 12px; 
      cursor: pointer; 
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(66, 153, 225, 0.4);
      position: relative;
      overflow: hidden;
    }
    
    .login-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.6s;
    }
    
    .login-btn:hover::before {
      left: 100%;
    }
    
    .login-btn:hover { 
      background: linear-gradient(135deg, #3182ce 0%, #2c5282 100%);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(66, 153, 225, 0.5);
    }
    
    .login-btn:active {
      transform: translateY(0);
    }
    
    .login-msg { 
      color: #e53e3e; 
      font-size: 14px; 
      min-height: 20px; 
      margin-bottom: 8px;
      padding: 8px 12px;
      background: rgba(254, 215, 215, 0.8);
      border-radius: 8px;
      border-left: 4px solid #e53e3e;
      font-weight: 500;
      display: none;
    }
    
    .login-msg.show {
      display: block;
      animation: fadeInShake 0.5s ease-out;
    }
    
    @keyframes fadeInShake {
      0% { opacity: 0; transform: translateX(-10px); }
      50% { transform: translateX(5px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    
    .login-footer { 
      margin-top: 40px; 
      font-size: 13px; 
      color: #718096; 
      text-align: center;
      font-weight: 500;
    }
    
    .form-group {
      position: relative;
      margin-bottom: 24px;
    }
    
    .form-group:last-of-type {
      margin-bottom: 32px;
    }
    
    /* 로딩 애니메이션 */
    .login-btn.loading {
      pointer-events: none;
      background: linear-gradient(135deg, #a0aec0 0%, #718096 100%);
    }
    
    .login-btn.loading::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border: 2px solid transparent;
      border-top: 2px solid #ffffff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    
    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }
    
    /* 반응형 */
    @media (max-width: 480px) {
      .login-wrap {
        width: 90%;
        max-width: 380px;
        padding: 40px 32px 32px 32px;
        margin: 20px;
      }
      
      .login-title {
        font-size: 24px;
        margin-bottom: 28px;
      }
      
      .login-input {
        padding: 14px 16px;
        font-size: 15px;
      }
      
      .login-btn {
        padding: 14px 0;
        font-size: 16px;
      }
    }
    
    /* 접근성 향상 */
    .login-input:invalid {
      border-color: #e2e8f0;
    }
    
    .login-input:invalid:focus {
      border-color: #e53e3e;
      box-shadow: 0 0 0 4px rgba(229, 62, 62, 0.1);
    }
    
    /* 성공 메시지 */
    .login-success {
      color: #22543d;
      background: rgba(198, 246, 213, 0.8);
      border-left: 4px solid #38a169;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <img src="https://i.ibb.co/NKJbp7v/cubig-logo.png" class="login-logo" alt="CUBIG">
    <div class="login-title">LLM Capsule Admin</div>
    <form class="login-form" autocomplete="off" onsubmit="return loginCheck();">
      <div class="login-msg" id="loginMsg"></div>
      
      <div class="form-group">
        <label class="login-label" for="email">이메일 (회사 계정)</label>
        <input class="login-input" id="email" type="email" required placeholder="이메일을 입력해 주세요">
      </div>
      
      <div class="form-group">
        <label class="login-label" for="pw">비밀번호</label>
        <input class="login-input" id="pw" type="password" required placeholder="비밀번호를 입력해 주세요">
      </div>
      
      <button class="login-btn" type="submit" id="loginBtn">
        <span id="btnText">로그인</span>
      </button>
    </form>
    <div class="login-footer">ⓒ CUBIG All Rights Reserved.</div>
  </div>
  
  <script>
    // 로그인 인증 처리 (아이디/비번 하드코딩)
    const LOGIN_ID = "ttest@cubig.ai";
    const LOGIN_PW = "ttest0708!@#";

    function showMessage(text, isSuccess = false) {
      const msg = document.getElementById('loginMsg');
      msg.textContent = text;
      msg.className = isSuccess ? 'login-msg login-success show' : 'login-msg show';
      
      // 3초 후 메시지 숨기기
      setTimeout(() => {
        msg.classList.remove('show');
      }, 3000);
    }

    function setLoading(isLoading) {
      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('btnText');
      
      if (isLoading) {
        btn.classList.add('loading');
        btnText.textContent = '로그인 중...';
        btn.disabled = true;
      } else {
        btn.classList.remove('loading');
        btnText.textContent = '로그인';
        btn.disabled = false;
      }
    }

    function loginCheck() {
      const id = document.getElementById('email').value.trim();
      const pw = document.getElementById('pw').value;
      
      // 빈 값 체크
      if (!id || !pw) {
        showMessage("이메일과 비밀번호를 모두 입력해 주세요.");
        return false;
      }
      
      // 로딩 시작
      setLoading(true);
      
      // 실제 환경에서는 서버 API 호출
      setTimeout(() => {
        if (id === LOGIN_ID && pw === LOGIN_PW) {
          showMessage("로그인 성공! 페이지를 이동합니다.", true);
          localStorage.setItem('cubig_login', 'Y');
          localStorage.setItem('cubig_user', id);
          
          // 1초 후 페이지 이동
          setTimeout(() => {
            location.href = 'https://wintryjay.github.io/for-references/02_00_dashBoard.html'; // 실제 대시보드 경로로
          }, 1000);
        } else {
          showMessage("아이디 또는 비밀번호가 일치하지 않습니다.");
          setLoading(false);
          
          // 비밀번호 필드 포커스
          document.getElementById('pw').focus();
          document.getElementById('pw').select();
        }
      }, 800); // 0.8초 로딩 시뮬레이션
      
      return false; // 폼 submit 방지
    }

    // 이미 로그인 되어 있으면 자동 이동
    if (localStorage.getItem('cubig_login') === 'Y') {
      showMessage("이미 로그인되어 있습니다. 대시보드로 이동합니다.", true);
      setTimeout(() => {
        location.href = 'dashboard.html';
      }, 1000);
    }

    // Enter 키 처리
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        loginCheck();
      }
    });

    // 입력 필드 자동 포커스
    window.addEventListener('load', function() {
      document.getElementById('email').focus();
    });

    // 입력 시 에러 메시지 숨기기
    document.getElementById('email').addEventListener('input', function() {
      const msg = document.getElementById('loginMsg');
      if (msg.classList.contains('show') && !msg.classList.contains('login-success')) {
        msg.classList.remove('show');
      }
    });

    document.getElementById('pw').addEventListener('input', function() {
      const msg = document.getElementById('loginMsg');
      if (msg.classList.contains('show') && !msg.classList.contains('login-success')) {
        msg.classList.remove('show');
      }
    });
  </script>
</body>
</html>
